# Railway Configuration for 誠憶鮮蔬外送系統
[build]
builder = "nixpacks"
watchPatterns = ["src/**", "views/**", "public/**", "package.json", "railway.toml", "*.sql", "*.js", "*.md"]

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "always"
replicas = 1

# 強制重建標記 - 2025-09-22 客戶資料記憶功能部署
[variables.rebuild]
FORCE_REBUILD = "2025-09-22-customer-data-persistence-deploy"

[variables]
# Node.js 生產環境設定
NODE_ENV = "production"
PORT = "3000"

# 系統設定
SYSTEM_NAME = "誠憶鮮蔬外送系統"

# 注意：敏感資訊請透過 Railway Dashboard 環境變數設置
# 請在 Railway Dashboard 中設置以下環境變數：
# ADMIN_EMAIL - 管理員信箱
# ADMIN_PASSWORD - 管理員密碼
# SESSION_SECRET - Session 密鑰
# LINE_CHANNEL_ID - LINE 頻道 ID
# LINE_CHANNEL_SECRET - LINE 頻道密鑰
# LINE_CHANNEL_ACCESS_TOKEN - LINE 存取權杖
# LINE_LIFF_ID - LINE LIFF ID
# GOOGLE_MAPS_API_KEY - Google Maps API 密鑰

# 資料庫設定（Railway將自動提供）
# DATABASE_URL - Railway PostgreSQL自動設置
# REDIS_URL - Railway Redis自動設置 (可選)